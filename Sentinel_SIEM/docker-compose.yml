services:
  postgres:
    image: postgres:16-alpine
    container_name: sentinel-forge-postgres
    environment:
      POSTGRES_USER: siem
      POSTGRES_PASSWORD: siem
      POSTGRES_DB: sentinel_forge
    ports:
      - "5432:5432"
    volumes:
      - sentinel_forge_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siem -d sentinel_forge"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sentinel_forge_pg:
